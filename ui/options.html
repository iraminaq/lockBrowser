<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LockBrowser Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <p class="eyebrow">LockBrowser</p>
        <h1>設定</h1>
        <p class="lead">
          ロック間隔と出題バランスの基本設定を調整します。細かい学習アルゴリズム設定は今後ここに追加していきます。
        </p>
      </header>

      <section class="card">
        <h2>基本設定</h2>
        <form id="settings-form" class="settings-form">
          <label class="field">
            <span>ロック間隔</span>
            <select id="lock-interval-ms">
              <option value="5000">5秒</option>
              <option value="30000">30秒</option>
              <option value="60000">1分</option>
              <option value="300000">5分</option>
            </select>
          </label>

          <label class="field">
            <span>初見連続制限</span>
            <input id="max-consecutive-unseen" type="number" min="1" max="10" />
          </label>

          <label class="field">
            <span>同一リスト連続上限</span>
            <input id="same-list-bias-limit" type="number" min="1" max="10" />
          </label>

          <div class="form-actions">
            <button type="submit" class="primary-button">保存</button>
            <p id="save-status" class="save-status"></p>
          </div>
        </form>
      </section>
    </main>

    <script src="../data/default-data.js"></script>
    <script src="../storage/storage.js"></script>
    <script src="options.js"></script>
  </body>
</html>
