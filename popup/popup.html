<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LockBrowser Popup</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <p class="eyebrow">lockBrowser</p>
      <div class="status-row">
        <p id="lock-status" class="status-text">状態を読み込み中…</p>
        <span id="state-pill" class="state-pill">確認中</span>
      </div>
      <p id="next-lock" class="countdown-text"></p>

      <button id="pause-button" class="primary-button" type="button">一時停止</button>

      <div class="link-actions">
        <button id="open-dashboard" class="secondary-button" type="button">問題管理</button>
        <button id="open-settings" class="secondary-button" type="button">設定</button>
      </div>
    </main>

    <script src="../data/default-data.js"></script>
    <script src="../logic/schema.js"></script>
    <script src="../logic/resolved-card.js"></script>
    <script src="../storage/storage.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
