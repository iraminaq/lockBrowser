<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LockBrowser Popup</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <p class="eyebrow">LockBrowser</p>
      <h1>クイック操作</h1>

      <section class="panel">
        <p id="lock-status" class="status-text">状態を読み込み中…</p>
        <p id="next-lock" class="subtext"></p>
      </section>

      <div class="actions">
        <button id="pause-button" class="primary-button" type="button">一時停止</button>
        <button id="open-dashboard" class="secondary-button" type="button">問題画面を開く</button>
        <button id="open-settings" class="secondary-button" type="button">設定画面を開く</button>
      </div>
    </main>

    <script src="../data/default-data.js"></script>
    <script src="../storage/storage.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
